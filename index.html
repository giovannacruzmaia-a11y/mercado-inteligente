<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Mercado Inteligente"/>
  <meta name="theme-color" content="#F7F5F1"/>
  <title>Mercado Inteligente</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#F7F5F1;font-family:Georgia,serif}
    input,select,textarea{font-family:inherit}
    button{cursor:pointer;font-family:inherit}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:#F7F5F1}
    ::-webkit-scrollbar-thumb{background:#D5D0C6;border-radius:2px}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    .fade-in{animation:fadeIn 0.3s ease forwards}
    .slide-up{animation:slideUp 0.35s ease forwards}
    input::placeholder{color:#8A9A96}
    input:focus,select:focus{outline:none;border-color:#344945!important}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

const SK={products:"mi-products",purchases:"mi-purchases",stores:"mi-stores"};
const load=k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}};
const save=(k,d)=>{try{localStorage.setItem(k,JSON.stringify(d))}catch(e){console.error(e)}};

const C={bg:"#F7F5F1",bgCard:"#EDE9E2",bgDeep:"#E4E0D8",border:"#D5D0C6",borderDk:"#BFB9AE",viridian:"#344945",viridianL:"#4A6560",viridianXL:"#7A9A94",sky:"#D5E3E8",skyDk:"#A8C4CC",honey:"#E4E3BC",honeyDk:"#C8C79A",stone:"#E0DCD1",text:"#2A3230",textMid:"#5A6A66",textSoft:"#8A9A96",err:"#8B3A2A",errBg:"#F5E8E4"};

const DS=[{id:"s1",name:"Supermercado Convém",color:C.viridian},{id:"s2",name:"Quitanda",color:"#8B6A3A"}];
const DC=["Carnes","Grãos e Cereais","Laticínios","Hortifruti","Limpeza","Higiene","Bebidas","Congelados","Outros"];

const svgs={
  cart:`<circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>`,
  chart:`<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>`,
  history:`<polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.75"/>`,
  plus:`<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>`,
  check:`<polyline points="20 6 9 17 4 12"/>`,
  trash:`<polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/>`,
  camera:`<path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/>`,
  receipt:`<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>`,
  store:`<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>`,
  back:`<polyline points="15 18 9 12 15 6"/>`,
  close:`<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>`,
  leaf:`<path d="M2 22c1.25-1.25 2.5-2.5 3.75-3.75C7 17 8 16 9 15c2-2 4-5 5-8-3 1-6 3-8 5-1 1-2 2-3 3.25C2 16.5 2 19 2 22z"/><path d="M22 2c-5 1-9 4-11 8"/>`,
};
const Icon=({name,size=20})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" dangerouslySetInnerHTML={{__html:svgs[name]||""}}/>;

function App(){
  const[tab,setTab]=useState("lista");
  const[stores,setStores]=useState(DS);
  const[products,setProducts]=useState([]);
  const[purchases,setPurchases]=useState([]);
  const[loading,setLoading]=useState(true);
  useEffect(()=>{
    const s=load(SK.stores),p=load(SK.products),pu=load(SK.purchases);
    if(s)setStores(s);if(p)setProducts(p);if(pu)setPurchases(pu);
    setLoading(false);
  },[]);
  const SS=d=>{setStores(d);save(SK.stores,d)};
  const SP=d=>{setProducts(d);save(SK.products,d)};
  const SU=d=>{setPurchases(d);save(SK.purchases,d)};
  if(loading)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:C.bg,color:C.viridian,fontSize:16,letterSpacing:3}}>carregando...</div>;
  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.text,maxWidth:480,margin:"0 auto",paddingBottom:80}}>
      <div style={{padding:"22px 20px 14px",borderBottom:`1px solid ${C.border}`,background:C.bg}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <Icon name="leaf" size={20}/>
          <div>
            <div style={{fontSize:20,fontWeight:"bold",letterSpacing:1,color:C.viridian}}>Mercado Inteligente</div>
            <div style={{fontSize:10,color:C.textSoft,letterSpacing:3,textTransform:"uppercase"}}>controle de compras</div>
          </div>
        </div>
      </div>
      <div style={{paddingBottom:20}}>
        {tab==="lista"&&<Lista stores={stores} products={products} purchases={purchases} SU={SU} SP={SP}/>}
        {tab==="historico"&&<Historico purchases={purchases} stores={stores} SU={SU}/>}
        {tab==="metricas"&&<Metricas purchases={purchases} stores={stores}/>}
        {tab==="config"&&<Config stores={stores} SS={SS} products={products}/>}
      </div>
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:C.bg,borderTop:`1px solid ${C.border}`,display:"flex",zIndex:100}}>
        {[{id:"lista",icon:"cart",label:"Lista"},{id:"historico",icon:"history",label:"Histórico"},{id:"metricas",icon:"chart",label:"Métricas"},{id:"config",icon:"store",label:"Config"}].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"12px 0 10px",background:"none",border:"none",color:tab===t.id?C.viridian:C.textSoft,display:"flex",flexDirection:"column",alignItems:"center",gap:4,transition:"color 0.2s"}}>
            <Icon name={t.icon} size={20}/><span style={{fontSize:9,letterSpacing:1.5,textTransform:"uppercase"}}>{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

function ReceiptModal({stores,selectedStore,setSelectedStore,onClose,onSave}){
  const[analysis,setAnalysis]=useState(null);
  const[analyzing,setAnalyzing]=useState(false);
  const[pastedText,setPastedText]=useState("");
  const analyze=async()=>{
    if(!pastedText.trim())return;
    setAnalyzing(true);
    try{
      const resp=await fetch("/api/analyze",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:`Você vai analisar o texto de um cupom fiscal (NFC-e) brasileiro copiado do iPhone. O texto pode estar desorganizado, com quebras de linha no meio das palavras, códigos de barras e valores espalhados.

Regras:
1. Ignore códigos numéricos longos (EAN/código de barras com 13+ dígitos)
2. Identifique cada produto pelo NOME (texto descritivo, geralmente em maiúsculas)
3. Para cada produto extraia: quantidade (ex: 0,624 kg ou 1,000 UN), valor unitário (VL.UNIT) e valor total (VL.TOTAL)
4. Ignore linhas de: DESCONTO ITEM, Qtde. total de itens, Valor total, Valor a Pagar, FORMA DE PAGAMENTO, chave NFC-e, CONSUMIDOR
5. A data está no formato DD/MM/AAAA perto do texto "NFC-e no" ou "Serie"
6. Use vírgula como decimal (ex: 2,80 = 2.80)
7. Para qty, converta vírgula para ponto (ex: 0,624 = 0.624)

Retorne APENAS JSON válido sem markdown sem texto extra:
{"items":[{"name":"nome do produto","qty":1.0,"unit":"kg ou UN","price":0.00}],"total":0.00,"store":"nome da loja ou null","date":"DD/MM/AAAA ou null"}

Texto do cupom:
${pastedText}`}]})});
      const data=await resp.json();
      const txt=data.content?.find(b=>b.type==="text")?.text||"";
      setAnalysis(JSON.parse(txt.replace(/```json|```/g,"").trim()));
    }catch{setAnalysis({error:"Não consegui interpretar o texto. Tente colar novamente."})}
    setAnalyzing(false);
  };
  const apply=()=>{
    if(!analysis?.items)return;
    const date=analysis.date?new Date(analysis.date).toISOString():new Date().toISOString();
    onSave(analysis.items.map(item=>({id:Date.now().toString()+Math.random(),productName:item.name,category:"Outros",qty:item.qty,unit:item.unit||"un",storeId:selectedStore,date,price:item.price})));
    onClose();
  };
  const[extraInfo,setExtraInfo]=useState({total:"",discount:"",paid:"",date:""});
  return(
    <div style={{position:"fixed",inset:0,background:"#00000055",zIndex:200,display:"flex",alignItems:"flex-end"}}>
      <div className="slide-up" style={{width:"100%",maxWidth:480,margin:"0 auto",background:C.bg,borderRadius:"20px 20px 0 0",padding:24,border:`1px solid ${C.border}`,maxHeight:"92vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div style={{fontSize:16,color:C.viridian,fontWeight:"bold"}}>Informações do Cupom Fiscal</div>
          <button onClick={onClose} style={{background:"none",border:"none",color:C.textMid}}><Icon name="close"/></button>
        </div>
        {!analysis&&!analyzing&&(<>
          <div style={{fontSize:12,color:C.textSoft,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Local da compra</div>
          <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
            {stores.map(s=><button key={s.id} onClick={()=>setSelectedStore(s.id)} style={{padding:"7px 14px",borderRadius:20,border:`1.5px solid ${selectedStore===s.id?s.color:C.border}`,background:selectedStore===s.id?s.color+"18":"none",color:selectedStore===s.id?s.color:C.textMid,fontSize:13}}>{s.name}</button>)}
          </div>

          <div style={{background:C.honey,borderRadius:12,padding:"14px 16px",marginBottom:16,border:`1px solid ${C.honeyDk}`}}>
            <div style={{fontSize:12,color:C.viridian,fontWeight:"bold",marginBottom:10}}>Como fazer:</div>
            <div style={{fontSize:13,color:C.textMid,lineHeight:1.9}}>
              1. Tire uma foto do cupom fiscal<br/>
              2. Abra o <b>Manus</b> e envie a foto com o seguinte pedido:<br/>
            </div>
            <div style={{background:C.bgCard,borderRadius:8,padding:"10px 12px",margin:"10px 0",border:`1px solid ${C.border}`,fontSize:12,color:C.text,lineHeight:1.7,fontStyle:"italic"}}>
              "Extraia deste cupom fiscal: a descrição de cada produto, quantidade, valor unitário e valor total de cada item. Depois informe: valor total dos produtos, desconto aplicado, valor a pagar e a data da compra."
            </div>
            <div style={{fontSize:13,color:C.textMid,lineHeight:1.9}}>
              3. Copie a resposta do Manus<br/>
              4. Cole no campo abaixo e clique em Analisar
            </div>
          </div>

          <div style={{fontSize:12,color:C.textSoft,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Texto extraído pelo Manus</div>
          <textarea
            placeholder="Cole aqui a resposta do Manus com os produtos e valores..."
            value={pastedText}
            onChange={e=>setPastedText(e.target.value)}
            style={{width:"100%",minHeight:130,background:C.bgCard,border:`1.5px solid ${C.border}`,borderRadius:10,padding:"12px 14px",color:C.text,fontSize:13,lineHeight:1.6,resize:"vertical",marginBottom:16}}
          />

          <div style={{fontSize:12,color:C.textSoft,letterSpacing:1,textTransform:"uppercase",marginBottom:10}}>Informações gerais</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
            {[["total","Valor total (R$)","291,75"],["discount","Desconto (R$)","10,00"],["paid","Valor pago (R$)","281,75"],["date","Data da compra","06/06/2026"]].map(([k,l,ph])=>(
              <div key={k}>
                <div style={{fontSize:11,color:C.textSoft,marginBottom:4}}>{l}</div>
                <input placeholder={ph} value={extraInfo[k]} onChange={e=>setExtraInfo(p=>({...p,[k]:e.target.value}))}
                  style={{width:"100%",background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 11px",color:C.text,fontSize:13}}/>
              </div>
            ))}
          </div>

          <button onClick={analyze} disabled={!pastedText.trim()} style={{width:"100%",padding:"14px",borderRadius:10,border:"none",background:pastedText.trim()?C.viridian:C.bgDeep,color:pastedText.trim()?C.bg:C.textSoft,fontSize:14,letterSpacing:0.3}}>
            Analisar comprovante →
          </button>
        </>)}
        {analyzing&&<div style={{textAlign:"center",padding:"30px 0",color:C.textMid}}><div style={{width:32,height:32,border:`2px solid ${C.border}`,borderTopColor:C.viridian,borderRadius:"50%",margin:"0 auto 14px",animation:"spin 0.8s linear infinite"}}/> Lendo comprovante...</div>}
        {analysis?.error&&<div style={{padding:14,background:C.errBg,borderRadius:10,color:C.err,fontSize:13,marginBottom:12}}>{analysis.error}<br/><button onClick={()=>setAnalysis(null)} style={{marginTop:8,background:"none",border:`1px solid ${C.err}`,borderRadius:6,padding:"6px 12px",color:C.err,fontSize:12}}>Tentar novamente</button></div>}
        {analysis?.items&&(<div>
          <div style={{fontSize:11,color:C.textSoft,marginBottom:12,letterSpacing:1,textTransform:"uppercase"}}>{analysis.store&&`${analysis.store} · `}{analysis.items.length} itens · {extraInfo.date||analysis.date||""}</div>
          <div style={{maxHeight:200,overflowY:"auto",marginBottom:12}}>
            {analysis.items.map((item,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 12px",background:C.bgCard,borderRadius:8,marginBottom:6,border:`1px solid ${C.border}`}}>
              <div><div style={{fontSize:13,color:C.text}}>{item.name}</div><div style={{fontSize:11,color:C.textSoft}}>{item.qty} {item.unit}</div></div>
              <div style={{fontSize:14,color:C.viridian,fontWeight:"bold"}}>R$ {Number(item.price).toFixed(2)}</div>
            </div>)}
          </div>
          <div style={{background:C.honey,borderRadius:10,padding:"12px 14px",marginBottom:14}}>
            {extraInfo.total&&<div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:13,color:C.textMid}}>Total dos produtos</span><span style={{fontSize:13,color:C.text}}>R$ {extraInfo.total}</span></div>}
            {extraInfo.discount&&<div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:13,color:C.textMid}}>Desconto</span><span style={{fontSize:13,color:C.err}}>- R$ {extraInfo.discount}</span></div>}
            {extraInfo.paid&&<div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:14,color:C.text,fontWeight:"bold"}}>Valor pago</span><span style={{fontSize:15,color:C.viridian,fontWeight:"bold"}}>R$ {extraInfo.paid}</span></div>}
          </div>
          <button onClick={apply} style={{width:"100%",padding:"14px",borderRadius:10,border:"none",background:C.viridian,color:C.bg,fontSize:14}}>Salvar no histórico</button>
        </div>)}
      </div>
    </div>
  );
}

function Lista({stores,products,purchases,SU,SP}){
  const[mode,setMode]=useState("home");
  const[list,setList]=useState([]);
  const[sel,setSel]=useState(null);
  const[showAdd,setShowAdd]=useState(false);
  const[newItem,setNewItem]=useState({name:"",category:"Outros",qty:"1",unit:"un"});
  const[showReceipt,setShowReceipt]=useState(false);
  const units=["un","kg","g","L","ml","cx","pct","dz"];
  const addToList=()=>{if(!newItem.name.trim())return;setList(p=>[...p,{id:Date.now().toString(),name:newItem.name.trim(),category:newItem.category,qty:parseFloat(newItem.qty)||1,unit:newItem.unit,checked:false,actualQty:null}]);setNewItem({name:"",category:"Outros",qty:"1",unit:"un"});setShowAdd(false)};
  const toggle=id=>setList(p=>p.map(i=>i.id===id?{...i,checked:!i.checked}:i));
  const updQty=(id,v)=>setList(p=>p.map(i=>i.id===id?{...i,actualQty:v}:i));
  const rem=id=>setList(p=>p.filter(i=>i.id!==id));
  const finish=()=>{const b=list.filter(i=>i.checked);if(!b.length)return;const date=new Date().toISOString();SU([...purchases,...b.map(item=>({id:Date.now().toString()+Math.random(),productName:item.name,category:item.category,qty:item.actualQty!==null?parseFloat(item.actualQty):item.qty,unit:item.unit,storeId:sel,date,price:null}))]);setMode("home");setList([]);setSel(null)};
  const sname=stores.find(s=>s.id===sel)?.name||"";
  const checked=list.filter(i=>i.checked).length;
  const grouped=DC.reduce((acc,cat)=>{const items=list.filter(i=>i.category===cat);if(items.length)acc[cat]=items;return acc},{});
  const inp={width:"100%",background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px",color:C.text,fontSize:14};
  const card={background:C.bgCard,borderRadius:10,border:`1px solid ${C.border}`};

  if(mode==="home")return(
    <div className="fade-in" style={{padding:"24px 20px"}}>
      <button onClick={()=>setShowReceipt(true)} style={{width:"100%",padding:"18px 20px",borderRadius:14,border:"none",background:C.viridian,color:C.bg,display:"flex",alignItems:"center",gap:14,marginBottom:28,boxShadow:"0 4px 16px #34494533"}}>
        <div style={{width:44,height:44,borderRadius:10,background:"#ffffff22",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Icon name="receipt" size={24}/></div>
        <div style={{textAlign:"left"}}><div style={{fontSize:16,fontWeight:"bold",letterSpacing:0.3}}>Adicionar informações do cupom</div><div style={{fontSize:12,opacity:0.7,marginTop:2}}>Via Manus → cole aqui → IA organiza tudo</div></div>
      </button>
      <div style={{fontSize:11,color:C.textSoft,letterSpacing:2,textTransform:"uppercase",marginBottom:16}}>Montar lista de compras</div>
      <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:24}}>
        {stores.map(s=><button key={s.id} onClick={()=>setSel(s.id)} style={{padding:"14px 18px",borderRadius:10,background:sel===s.id?s.color+"18":C.bgCard,border:`1.5px solid ${sel===s.id?s.color:C.border}`,color:sel===s.id?s.color:C.textMid,textAlign:"left",fontSize:15,transition:"all 0.2s"}}>{s.name}</button>)}
      </div>
      <button onClick={()=>sel&&setMode("buildList")} style={{width:"100%",padding:"15px",borderRadius:12,border:"none",background:sel?C.viridianL:C.bgDeep,color:sel?C.bg:C.textSoft,fontSize:15,letterSpacing:0.5,transition:"all 0.2s"}}>Montar lista →</button>
      <div style={{marginTop:28,...card,padding:16}}>
        <div style={{fontSize:11,color:C.textSoft,letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>Última compra</div>
        {purchases.length>0?(()=>{const last=[...purchases].sort((a,b)=>new Date(b.date)-new Date(a.date))[0];const st=stores.find(s=>s.id===last.storeId);return<div><div style={{fontSize:14,color:C.viridian,fontWeight:"bold"}}>{st?.name||"—"}</div><div style={{fontSize:12,color:C.textSoft,marginTop:4}}>{new Date(last.date).toLocaleDateString("pt-BR",{day:"2-digit",month:"long",year:"numeric"})}</div></div>})():<div style={{fontSize:13,color:C.textSoft}}>Nenhuma compra registrada ainda</div>}
      </div>
      {showReceipt&&<ReceiptModal stores={stores} selectedStore={sel} setSelectedStore={setSel} onClose={()=>setShowReceipt(false)} onSave={(items)=>SU([...purchases,...items])}/>}
    </div>
  );

  if(mode==="buildList")return(
    <div className="fade-in">
      <div style={{padding:"14px 20px",display:"flex",alignItems:"center",gap:12,borderBottom:`1px solid ${C.border}`,background:C.bg}}>
        <button onClick={()=>setMode("home")} style={{background:"none",border:"none",color:C.textMid,padding:4}}><Icon name="back"/></button>
        <div style={{flex:1}}><div style={{fontSize:13,color:C.viridian,fontWeight:"bold"}}>{sname}</div><div style={{fontSize:11,color:C.textSoft}}>{list.length} {list.length===1?"item":"itens"}</div></div>
        <button onClick={()=>list.length>0&&setMode("shopping")} style={{padding:"8px 16px",borderRadius:8,border:"none",background:list.length>0?C.viridian:C.bgDeep,color:list.length>0?C.bg:C.textSoft,fontSize:13}}>Ir às compras →</button>
      </div>
      <div style={{padding:"16px 20px"}}>
        {Object.entries(grouped).map(([cat,items])=><div key={cat} style={{marginBottom:20}}><div style={{fontSize:10,color:C.textSoft,letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>{cat}</div>{items.map(item=><div key={item.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",...card,marginBottom:6}}><span style={{fontSize:14,color:C.text}}>{item.name}</span><div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:13,color:C.textSoft}}>{item.qty} {item.unit}</span><button onClick={()=>rem(item.id)} style={{background:"none",border:"none",color:C.borderDk,padding:2}}><Icon name="trash" size={15}/></button></div></div>)}</div>)}
        {list.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:C.textSoft,fontSize:14}}>Adicione itens à lista</div>}
        {showAdd?(<div className="slide-up" style={{...card,padding:16,marginTop:12,borderColor:C.viridianXL}}>
          <input placeholder="Nome do produto" value={newItem.name} onChange={e=>setNewItem(p=>({...p,name:e.target.value}))} style={{...inp,marginBottom:10}}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <input placeholder="Qtd" type="number" value={newItem.qty} onChange={e=>setNewItem(p=>({...p,qty:e.target.value}))} style={inp}/>
            <select value={newItem.unit} onChange={e=>setNewItem(p=>({...p,unit:e.target.value}))} style={inp}>{units.map(u=><option key={u} value={u}>{u}</option>)}</select>
          </div>
          <select value={newItem.category} onChange={e=>setNewItem(p=>({...p,category:e.target.value}))} style={{...inp,marginBottom:12}}>{DC.map(c=><option key={c} value={c}>{c}</option>)}</select>
          <div style={{display:"flex",gap:8}}><button onClick={addToList} style={{flex:1,padding:"10px",borderRadius:8,border:"none",background:C.viridian,color:C.bg,fontSize:14}}>Adicionar</button><button onClick={()=>setShowAdd(false)} style={{padding:"10px 14px",borderRadius:8,border:`1px solid ${C.border}`,background:"none",color:C.textMid,fontSize:14}}>Cancelar</button></div>
        </div>):(<button onClick={()=>setShowAdd(true)} style={{width:"100%",padding:"14px",borderRadius:10,border:`1.5px dashed ${C.borderDk}`,background:"none",color:C.textMid,fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginTop:8}}><Icon name="plus" size={16}/> Adicionar item</button>)}
      </div>
    </div>
  );

  if(mode==="shopping")return(
    <div className="fade-in">
      <div style={{padding:"14px 20px",display:"flex",alignItems:"center",gap:12,borderBottom:`1px solid ${C.border}`,background:C.bg}}>
        <button onClick={()=>setMode("buildList")} style={{background:"none",border:"none",color:C.textMid,padding:4}}><Icon name="back"/></button>
        <div style={{flex:1}}><div style={{fontSize:13,color:C.viridian,fontWeight:"bold"}}>{sname}</div><div style={{fontSize:11,color:C.textSoft}}>{checked}/{list.length} itens</div></div>
      </div>
      <button onClick={()=>setShowReceipt(true)} style={{width:"100%",padding:"13px 20px",background:C.viridian,border:"none",color:C.bg,display:"flex",alignItems:"center",justifyContent:"center",gap:10,fontSize:14,letterSpacing:0.5}}><Icon name="receipt" size={18}/> Adicionar informações do cupom</button>
      <div style={{height:3,background:C.stone}}><div style={{height:"100%",background:C.viridian,width:`${list.length?(checked/list.length)*100:0}%`,transition:"width 0.4s"}}/></div>
      <div style={{padding:"16px 20px"}}>
        {Object.entries(grouped).map(([cat,items])=><div key={cat} style={{marginBottom:20}}><div style={{fontSize:10,color:C.textSoft,letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>{cat}</div>{items.map(item=><div key={item.id} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",background:item.checked?C.sky+"55":C.bgCard,borderRadius:10,marginBottom:8,border:`1px solid ${item.checked?C.skyDk:C.border}`,transition:"all 0.2s"}}><button onClick={()=>toggle(item.id)} style={{width:26,height:26,borderRadius:6,border:`1.5px solid ${item.checked?C.viridian:C.borderDk}`,background:item.checked?C.viridian:"none",display:"flex",alignItems:"center",justifyContent:"center",color:C.bg,flexShrink:0}}>{item.checked&&<Icon name="check" size={14}/>}</button><div style={{flex:1}}><div style={{fontSize:14,color:item.checked?C.textSoft:C.text,textDecoration:item.checked?"line-through":"none"}}>{item.name}</div><div style={{fontSize:11,color:C.textSoft,marginTop:2}}>Previsto: {item.qty} {item.unit}</div></div>{item.checked&&<div style={{display:"flex",alignItems:"center",gap:6}}><input type="number" placeholder={item.qty} value={item.actualQty??""} onChange={e=>updQty(item.id,e.target.value)} style={{width:58,background:C.bg,border:`1px solid ${C.viridianXL}`,borderRadius:6,padding:"6px 8px",color:C.viridian,fontSize:13,textAlign:"center"}}/><span style={{fontSize:11,color:C.textSoft}}>{item.unit}</span></div>}</div>)}</div>)}
        {checked>0&&<button onClick={finish} style={{width:"100%",padding:"15px",borderRadius:12,border:"none",background:C.viridian,color:C.bg,fontSize:15,marginTop:8,letterSpacing:0.5}}>Finalizar compra ({checked} {checked===1?"item":"itens"})</button>}
      </div>
      {showReceipt&&<ReceiptModal stores={stores} selectedStore={sel} setSelectedStore={setSel} onClose={()=>setShowReceipt(false)} onSave={(items)=>SU([...purchases,...items])}/>}
    </div>
  );
}

function Historico({purchases,stores,SU}){
  const[filter,setFilter]=useState("all");
  const sorted=[...purchases].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const filtered=filter==="all"?sorted:sorted.filter(p=>p.storeId===filter);
  const grouped=filtered.reduce((acc,p)=>{const k=new Date(p.date).toLocaleDateString("pt-BR",{day:"2-digit",month:"long",year:"numeric"});if(!acc[k])acc[k]=[];acc[k].push(p);return acc},{});
  return(
    <div className="fade-in">
      <div style={{padding:"14px 20px",overflowX:"auto",display:"flex",gap:8,borderBottom:`1px solid ${C.border}`}}>
        {[{id:"all",name:"Todos"},...stores].map(s=><button key={s.id} onClick={()=>setFilter(s.id)} style={{padding:"7px 14px",borderRadius:20,border:`1.5px solid ${filter===s.id?C.viridian:C.border}`,background:filter===s.id?C.viridian+"18":"none",color:filter===s.id?C.viridian:C.textSoft,fontSize:12,whiteSpace:"nowrap"}}>{s.name}</button>)}
      </div>
      <div style={{padding:"16px 20px"}}>
        {Object.keys(grouped).length===0&&<div style={{textAlign:"center",padding:"50px 0",color:C.textSoft,fontSize:14}}>Nenhuma compra registrada</div>}
        {Object.entries(grouped).map(([date,items])=><div key={date} style={{marginBottom:24}}>
          <div style={{fontSize:10,color:C.textSoft,letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>{date}</div>
          {items.map(item=>{const st=stores.find(s=>s.id===item.storeId);return(
            <div key={item.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",background:C.bgCard,borderRadius:10,marginBottom:6,border:`1px solid ${C.border}`}}>
              <div style={{flex:1}}><div style={{fontSize:14,color:C.text}}>{item.productName}</div><div style={{fontSize:11,color:C.textSoft,marginTop:3,display:"flex",gap:10,flexWrap:"wrap"}}><span>{item.qty} {item.unit}</span>{st&&<span style={{color:st.color}}>· {st.name}</span>}{item.price&&<span>· R$ {Number(item.price).toFixed(2)}</span>}</div></div>
              <button onClick={()=>SU(purchases.filter(p=>p.id!==item.id))} style={{background:"none",border:"none",color:C.borderDk,padding:4}}><Icon name="trash" size={16}/></button>
            </div>
          )})}
        </div>)}
      </div>
    </div>
  );
}

function Metricas({purchases,stores}){
  const[period,setPeriod]=useState("month");
  const now=new Date();
  const filtered=purchases.filter(p=>{const d=new Date(p.date);if(period==="month")return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();if(period==="3months")return(now-d)<90*86400000;return true});
  const pc=filtered.reduce((acc,p)=>{acc[p.productName]=(acc[p.productName]||0)+1;return acc},{});
  const top=Object.entries(pc).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const sc=filtered.reduce((acc,p)=>{const n=stores.find(s=>s.id===p.storeId)?.name||"Outro";acc[n]=(acc[n]||0)+1;return acc},{});
  const pbn={};[...purchases].sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach(p=>{if(!pbn[p.productName])pbn[p.productName]=[];pbn[p.productName].push(new Date(p.date))});
  const dur=Object.entries(pbn).filter(([,d])=>d.length>1).map(([n,d])=>{const df=[];for(let i=1;i<d.length;i++)df.push((d[i]-d[i-1])/86400000);return[n,Math.round(df.reduce((a,b)=>a+b,0)/df.length)]}).sort((a,b)=>a[1]-b[1]).slice(0,5);
  const chip=a=>({padding:"7px 14px",borderRadius:20,border:`1.5px solid ${a?C.viridian:C.border}`,background:a?C.viridian+"18":"none",color:a?C.viridian:C.textSoft,fontSize:12});
  return(
    <div className="fade-in" style={{padding:"16px 20px"}}>
      <div style={{display:"flex",gap:8,marginBottom:20}}>
        {[{id:"month",l:"Este mês"},{id:"3months",l:"3 meses"},{id:"all",l:"Tudo"}].map(p=><button key={p.id} onClick={()=>setPeriod(p.id)} style={chip(period===p.id)}>{p.l}</button>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
        {[["Compras",filtered.length,"itens registrados"],["Produtos únicos",Object.keys(pc).length,"diferentes"]].map(([l,v,s])=><div key={l} style={{background:C.honey,borderRadius:10,padding:"14px 16px",border:`1px solid ${C.honeyDk}`}}><div style={{fontSize:10,color:C.textMid,letterSpacing:1.5,textTransform:"uppercase",marginBottom:6}}>{l}</div><div style={{fontSize:26,color:C.viridian,fontWeight:"bold"}}>{v}</div><div style={{fontSize:11,color:C.textSoft,marginTop:3}}>{s}</div></div>)}
      </div>
      {top.length>0&&<div style={{marginBottom:20}}><div style={{fontSize:10,color:C.textSoft,letterSpacing:2,textTransform:"uppercase",marginBottom:12}}>Mais comprados</div>{top.map(([n,c],i)=><div key={n} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",background:C.bgCard,borderRadius:8,marginBottom:6,border:`1px solid ${C.border}`}}><div style={{width:22,height:22,borderRadius:"50%",background:C.sky,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:C.viridian,flexShrink:0,fontWeight:"bold"}}>{i+1}</div><div style={{flex:1,fontSize:13,color:C.text}}>{n}</div><div style={{fontSize:13,color:C.viridian,fontWeight:"bold"}}>{c}×</div></div>)}</div>}
      {dur.length>0&&<div style={{marginBottom:20}}><div style={{fontSize:10,color:C.textSoft,letterSpacing:2,textTransform:"uppercase",marginBottom:12}}>Duração média entre compras</div>{dur.map(([n,d])=><div key={n} style={{display:"flex",justifyContent:"space-between",padding:"10px 14px",background:C.bgCard,borderRadius:8,marginBottom:6,border:`1px solid ${C.border}`}}><span style={{fontSize:13,color:C.text}}>{n}</span><span style={{fontSize:13,fontWeight:"bold",color:d<7?C.err:d<14?"#8B6A1A":C.viridian}}>{d} dias</span></div>)}</div>}
      {Object.keys(sc).length>0&&<div style={{marginBottom:20}}><div style={{fontSize:10,color:C.textSoft,letterSpacing:2,textTransform:"uppercase",marginBottom:12}}>Por local de compra</div>{Object.entries(sc).map(([n,c])=>{const tot=Object.values(sc).reduce((a,b)=>a+b,0);const pct=Math.round((c/tot)*100);const st=stores.find(s=>s.name===n);return(<div key={n} style={{marginBottom:12}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}><span style={{fontSize:13,color:C.text}}>{n}</span><span style={{fontSize:12,color:C.textSoft}}>{c} itens · {pct}%</span></div><div style={{height:5,background:C.stone,borderRadius:3}}><div style={{height:"100%",background:st?.color||C.viridian,width:`${pct}%`,borderRadius:3,transition:"width 0.6s"}}/></div></div>)})}</div>}
      {filtered.length===0&&<div style={{textAlign:"center",padding:"50px 0",color:C.textSoft,fontSize:14}}>Nenhum dado para o período selecionado</div>}
    </div>
  );
}

function Config({stores,SS,products}){
  const[nv,setNv]=useState("");
  const[show,setShow]=useState(false);
  const add=()=>{if(!nv.trim())return;SS([...stores,{id:Date.now().toString(),name:nv.trim(),color:C.viridian}]);setNv("");setShow(false)};
  return(
    <div className="fade-in" style={{padding:"16px 20px"}}>
      <div style={{marginBottom:28}}>
        <div style={{fontSize:10,color:C.textSoft,letterSpacing:2,textTransform:"uppercase",marginBottom:14}}>Locais de compra</div>
        {stores.map(s=><div key={s.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px",background:C.bgCard,borderRadius:10,marginBottom:8,border:`1px solid ${C.border}`}}><div style={{display:"flex",alignItems:"center",gap:10}}><div style={{width:10,height:10,borderRadius:"50%",background:s.color}}/><span style={{fontSize:14,color:C.text}}>{s.name}</span></div><button onClick={()=>SS(stores.filter(x=>x.id!==s.id))} style={{background:"none",border:"none",color:C.borderDk,padding:4}}><Icon name="trash" size={16}/></button></div>)}
        {show?(<div className="slide-up" style={{background:C.bgCard,borderRadius:10,padding:14,border:`1px solid ${C.viridianXL}`,marginTop:8}}>
          <input placeholder="Nome do local" value={nv} onChange={e=>setNv(e.target.value)} style={{width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px",color:C.text,fontSize:14,marginBottom:10}}/>
          <div style={{display:"flex",gap:8}}><button onClick={add} style={{flex:1,padding:"10px",borderRadius:8,border:"none",background:C.viridian,color:C.bg,fontSize:13}}>Adicionar</button><button onClick={()=>setShow(false)} style={{padding:"10px 12px",borderRadius:8,border:`1px solid ${C.border}`,background:"none",color:C.textMid,fontSize:13}}>Cancelar</button></div>
        </div>):(<button onClick={()=>setShow(true)} style={{width:"100%",padding:"12px",borderRadius:10,border:`1.5px dashed ${C.borderDk}`,background:"none",color:C.textMid,fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginTop:4}}><Icon name="plus" size={15}/> Novo local</button>)}
      </div>
      <div style={{padding:14,background:C.honey,borderRadius:10,border:`1px solid ${C.honeyDk}`}}>
        <div style={{fontSize:10,color:C.textMid,letterSpacing:1.5,textTransform:"uppercase",marginBottom:8}}>Sobre o app</div>
        <div style={{fontSize:13,color:C.textMid,lineHeight:1.8}}>Mercado Inteligente · v1.0<br/>{products.length} produtos · Dados salvos localmente</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
